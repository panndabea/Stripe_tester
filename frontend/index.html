<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Stripe Payment</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Stripe.js must be loaded from Stripe's CDN — never self-hosted -->
  <script src="https://js.stripe.com/v3/" defer></script>
</head>
<body>
  <div class="card">
    <h1>💳 Pay securely</h1>
    <p class="subtitle">Powered by Stripe</p>

    <form id="payment-form">
      <label for="amount">Amount (USD)</label>
      <input
        type="number"
        id="amount"
        min="0.50"
        step="0.01"
        value="10.00"
        required
      />

      <!-- Stripe injects its secure iFrame here -->
      <div id="payment-element"></div>

      <div id="payment-message" role="alert"></div>

      <button id="submit-btn" type="submit">
        <span id="btn-text">Pay now</span>
        <div id="spinner"></div>
      </button>
    </form>
  </div>

  <script>
    window.STRIPE_API_BASE = 'https://YOUR-WORKER-DOMAIN.workers.dev';
  </script>
  <script src="./payment.js" defer></script>
</body>
</html>
